        <h1>ParliPro — Congressional Debate Parliamentary Tool</h1>
        <p>ParliPro is a free, real-time parliamentary tool built for NSDA and TFA Congressional Debate. It helps Presiding Officers run chambers smoothly and gives every competitor a live view of the round.</p>
        <h2>How It Works</h2>
        <h3>Create a Chamber</h3>
        <p>Set up the roster, initial precedence, seating chart, and docket, then share the chamber code with participants.</p>
        <h3>Claim Your Role</h3>
        <p>When joining a chamber, competitors select their name from the roster. Once a PO has been decided, they can claim the role with a private PIN provided by the parliamentarian.</p>
        <h3>Run the Round</h3>
        <p>The PO selects speakers from the seating chart, manages speech and questioning timers, tracks alternating sides, calls votes on bills, and controls the flow of debate from their device.</p>
        <h3>Follow Along in Real Time</h3>
        <p>Competitors can set bill splits, see live speaker and questioning precedence, indicate intent to speak, and track vote thresholds and round summaries — all from a computer or phone.</p>
        <h2>Key Features</h2>
        <ul>
          <li>Speech and question precedence tracking</li>
          <li>30-second questioning block timers</li>
          <li>Bill split tracking (Affirmative, Negative, Both)</li>
          <li>Live seating chart with speaker recognition</li>
          <li>Vote threshold calculation (majority and two-thirds)</li>
          <li>Docket nomination and adoption system</li>
          <li>Round summaries and session recaps</li>
          <li>Real-time competitor views from any device</li>
        </ul>
        <p>ParliPro is free to use. No account required. Just create a chamber, share the code, and start debating.</p>
